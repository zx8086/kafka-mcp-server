# .devcontainer/docker-compose.yml
services:
  toolbox:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    command: sleep infinity
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      ksqldb-server:
        condition: service_healthy

  kafka:
    image: apache/kafka:latest
    user: root
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/kafka-data
      CLUSTER_ID: kafka-mcp-server-dev-cluster
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - kafka-data:/var/kafka-data

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: curl -f http://localhost:8081/subjects || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      kafka:
        condition: service_healthy

  ksqldb-server:
    image: confluentinc/ksqldb-server:0.29.0
    ports:
      - "8088:8088"
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka:29092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KSQL_KSQL_SERVICE_ID: kafka-mcp-server-ksql
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
    healthcheck:
      test: curl -f http://localhost:8088/info || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  flink-jobmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    ports:
      - "18081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        rest.bind-address: 0.0.0.0
    healthcheck:
      test: curl -f http://localhost:8081/config || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy

  flink-taskmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        rest.bind-address: 0.0.0.0
    healthcheck:
      test: pgrep -f TaskManagerRunner || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  flink-sql-gateway:
    build:
      context: .
      dockerfile: flink.Dockerfile
    ports:
      - "8083:8083"
    command: bin/sql-gateway.sh start-foreground -Dsql-gateway.endpoint.rest.address=0.0.0.0
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        rest.bind-address: 0.0.0.0
    healthcheck:
      test: curl -f http://localhost:8083/v1/info || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KSQLDBSERVER: http://ksqldb-server:8088
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      ksqldb-server:
        condition: service_healthy

volumes:
  kafka-data:
